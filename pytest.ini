[pytest]
# pytest 全局配置：标记、报告、日志
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    api: 接口层用例（requests）
    ui: UI 层用例（Selenium POM）
    auth: 登录模块
    cart: 购物车模块
    checkout: 结算模块
    payment: 支付模块
    order: 订单模块
    flaky: 偶发不稳定 UI 用例，可配合 --reruns

addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results

log_cli = true
log_cli_level = INFO
